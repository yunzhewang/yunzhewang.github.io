---
layout: default
---
<!-- 'page' refers to the md file of posts -->
<!-- if variable, i.e., date, title is set, they can be used in html page -->
<!-- hence, layout html is a template -->

<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title }}</h1>

<p class="view">by {{ page.author | default: site.author }}</p>

{{content}}

{% if page.tags %}
  <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
{% endif %}
